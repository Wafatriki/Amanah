<div class="documents-container">
  <!-- Header -->
  <div class="documents-header">
    <div class="header-content">
      <h1 class="page-title">Documentos</h1>
      <p class="page-subtitle">Gestiona todos los documentos del dependiente</p>
    </div>
    @if (canUploadDocument()) {
      <button class="btn-create" (click)="toggleUploadForm()" [class.active]="showUploadForm">
        {{ showUploadForm ? 'Cerrar' : '+ Nuevo Documento' }}
      </button>
    }
  </div>

  <!-- No dependent selected -->
  @if (!activeDependentId) {
    <div class="empty-state">
      <div class="empty-icon">Sin documentos</div>
      <p class="empty-title">Selecciona un dependiente</p>
      <p class="empty-subtitle">Elige un dependiente para gestionar sus documentos</p>
    </div>
  } @else {
    <!-- Upload form collapsible -->
    @if (showUploadForm) {
      <div class="upload-section">
        <app-document-upload
          [dependentId]="activeDependentId"
          (documentUploaded)="onDocumentUploaded()"
          (uploadCancelled)="onUploadCancelled()"
        ></app-document-upload>
      </div>
    }

    <!-- Document list -->
    <div class="list-section">
      <app-document-list
        [dependentId]="activeDependentId"
      ></app-document-list>
    </div>
  }
</div>
