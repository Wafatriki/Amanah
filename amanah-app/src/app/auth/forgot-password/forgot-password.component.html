<div class="login-container">
  <div class="login-card">
    <h1>Recuperar Contraseña</h1>

    <form [formGroup]="forgotForm" (ngSubmit)="onSendReset()">
      <!-- Email -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="tu@email.com"
        />
        <span *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched" class="error">
          {{ getEmailError() }}
        </span>
      </div>

      <!-- Success Message -->
      <div *ngIf="successMessage" class="success-box">
        {{ successMessage }}
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="error-box">
        {{ errorMessage }}
      </div>

      <!-- Button -->
      <button
        type="submit"
        [disabled]="forgotForm.invalid || isLoading"
        class="submit-btn"
      >
        {{ isLoading ? 'Enviando...' : 'Enviar enlace' }}
      </button>
    </form>

    <!-- Back Link -->
    <p class="link-text">
      <a routerLink="/login">Volver al login</a>
    </p>
  </div>
</div>
