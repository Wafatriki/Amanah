<div class="login-container">
  <div class="login-card">
    <div class="logo-section">
      <img src="/assets/logos/amanah-lila-lila.svg" alt="Amanah Logo" class="logo-img">
      <h1 class="app-name">Amanah</h1>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <!-- Email -->
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="tu@email.com"
        />
        <span *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error">
          {{ getEmailError() }}
        </span>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Contraseña"
        />
        <span *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error">
          {{ getPasswordError() }}
        </span>
      </div>

      <!-- Error -->
      <div *ngIf="errorMessage" class="error-box">
        {{ errorMessage }}
      </div>

      <!-- Button -->
      <button
        type="submit"
        [disabled]="loginForm.invalid || isLoading"
        class="submit-btn"
      >
        {{ isLoading ? 'Cargando...' : 'Iniciar sesión' }}
      </button>
    </form>

    <!-- Links -->
    <div class="links-section">
      <p class="link-text">
        ¿No tienes cuenta?
        <a href="javascript:void(0)" (click)="onRegisterClick()" class="link">Regístrate</a>
      </p>
      <p class="forgot-password-text">
        <a href="javascript:void(0)" (click)="onForgotPasswordClick()" class="link">¿Olvidaste tu contraseña?</a>
      </p>
    </div>
  </div>
</div>
